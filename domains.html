<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>PhishGuard Domain Lists</title>
  <style>
    :root {
      --bg: #fff;
      --surface: #fff;
      --surface-soft: #f8fafd;
      --input: #f1f3f4;
      --hover: #f1f3f4;
      --text: #202124;
      --text-secondary: #5f6368;
      --muted: #9aa0a6;
      --hairline: #eef0f3;
      --accent: #1a73e8;
      --accent-bg: #e8f0fe;
      --green: #188038;
      --green-bg: #e6f4ea;
      --red: #d93025;
      --red-bg: #fce8e6;
      --yellow: #e37400;
      --yellow-bg: #fef7e0;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Google Sans", Roboto, "Noto Sans KR", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      min-height: 100%;
      display: grid;
      grid-template-rows: auto auto 1fr;
    }

    .topbar {
      padding: 16px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      box-shadow: inset 0 -1px 0 var(--hairline);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--accent-bg);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .title { font-size: 16px; font-weight: 600; }
    .subtitle { margin-top: 3px; color: var(--text-secondary); font-size: 12px; }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      height: 34px;
      padding: 0 13px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      font-weight: 600;
    }

    .btn:hover { background: var(--hover); color: var(--text); }
    .btn.primary { background: var(--accent-bg); color: var(--accent); }
    .btn.danger { color: var(--red); }
    .btn.danger:hover { background: var(--red-bg); }

    .controls {
      padding: 12px 22px;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 150px auto;
      gap: 10px;
      align-items: center;
      box-shadow: inset 0 -1px 0 var(--hairline);
    }

    .field, .select {
      height: 36px;
      border: 1px solid #dadce0;
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      padding: 0 12px;
      font: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color .15s, box-shadow .15s, background .15s;
    }

    .field:focus, .select:focus {
      background: var(--surface);
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(26,115,232,.14);
    }

    .field::placeholder { color: var(--muted); }

    .main {
      min-height: 0;
      padding: 0 22px 22px;
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 22px;
    }

    .sidebar {
      padding: 18px 18px 0 0;
      box-shadow: inset -1px 0 0 var(--hairline);
    }

    .metric {
      padding: 13px 0;
      border-bottom: 1px solid var(--hairline);
    }

    .metric-label {
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 600;
    }

    .metric-value {
      margin-top: 8px;
      font-size: 26px;
      font-weight: 700;
    }

    .metric.safe .metric-value { color: var(--green); }
    .metric.block .metric-value { color: var(--red); }

    .note {
      padding-top: 16px;
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.6;
    }

    .lists {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
      padding-top: 10px;
    }

    .list-section {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .list-head {
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      box-shadow: inset 0 -1px 0 var(--hairline);
    }

    .list-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 700;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
    }

    .dot.block { background: var(--red); }

    .count {
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 600;
    }

    .list {
      min-height: 0;
      overflow: auto;
      display: flex;
      flex-direction: column;
    }

    .domain-item {
      min-height: 48px;
      padding: 10px 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      box-shadow: inset 0 -1px 0 var(--hairline);
    }

    .domain-main {
      min-width: 0;
    }

    .domain-name {
      font-size: 13px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .domain-kind {
      margin-top: 3px;
      color: var(--text-secondary);
      font-size: 11px;
    }

    .item-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .small-btn {
      height: 28px;
      padding: 0 9px;
      border: 1px solid transparent;
      border-radius: 7px;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
    }

    .small-btn:hover { background: var(--hover); color: var(--text); }
    .small-btn.danger { color: var(--red); }
    .small-btn.danger:hover { background: var(--red-bg); }

    .empty {
      padding: 28px 8px;
      color: var(--text-secondary);
      text-align: center;
      font-size: 12px;
      line-height: 1.6;
    }

    .status {
      position: fixed;
      left: 22px;
      bottom: 18px;
      max-width: calc(100vw - 44px);
      padding: 9px 12px;
      border-radius: 8px;
      background: #202124;
      color: #fff;
      font-size: 12px;
      box-shadow: 0 6px 18px rgba(60,64,67,.24);
      opacity: 0;
      transform: translateY(6px);
      pointer-events: none;
      transition: opacity .15s, transform .15s;
    }

    .status.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 760px) {
      .topbar, .controls { padding-left: 14px; padding-right: 14px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .toolbar { justify-content: flex-start; }
      .controls { grid-template-columns: 1fr; }
      .main { grid-template-columns: 1fr; padding: 0 14px 14px; }
      .sidebar { box-shadow: none; padding: 10px 0 0; }
      .lists { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="none">
            <path d="M8 1L1.5 4.5V8c0 3.866 2.91 7 6.5 7s6.5-3.134 6.5-7V4.5L8 1z" stroke="currentColor" stroke-width="1.3"/>
            <path d="M6 8l1.5 1.5L10 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <div class="title">도메인 목록 관리</div>
          <div class="subtitle">허용하거나 차단할 이메일 주소와 도메인을 정리합니다.</div>
        </div>
      </div>
      <div class="toolbar">
        <button type="button" class="btn primary" id="refresh-btn">새로고침</button>
        <button type="button" class="btn" id="export-btn">JSON 내보내기</button>
        <label class="btn" id="import-label" style="cursor:pointer;display:inline-flex;align-items:center;box-sizing:border-box">
          JSON 가져오기
          <input type="file" id="import-input" accept=".json" style="display:none">
        </label>
        <button type="button" class="btn" id="close-btn">닫기</button>
      </div>
    </header>

    <section class="controls" aria-label="도메인 추가와 검색">
      <input class="field" id="entry-input" type="text" placeholder="example.com 또는 user@example.com" autocomplete="off" spellcheck="false" />
      <select class="select" id="entry-type">
        <option value="whitelist">화이트리스트</option>
        <option value="blacklist">블랙리스트</option>
      </select>
      <button type="button" class="btn primary" id="add-btn">추가</button>
    </section>

    <section class="main">
      <aside class="sidebar" aria-label="목록 요약">
        <div class="metric safe">
          <div class="metric-label">화이트리스트</div>
          <div class="metric-value" id="whitelist-count">0</div>
        </div>
        <div class="metric block">
          <div class="metric-label">블랙리스트</div>
          <div class="metric-value" id="blacklist-count">0</div>
        </div>
        <div class="metric">
          <div class="metric-label">검색</div>
          <input class="field" id="search-input" type="search" placeholder="목록에서 찾기" autocomplete="off" style="margin-top:10px;width:100%;" />
        </div>
        <div class="note">
          도메인은 하위 도메인까지 함께 적용됩니다. 예를 들어 `example.com`은 `mail.example.com`에도 적용됩니다.
        </div>
      </aside>

      <section class="lists">
        <section class="list-section" aria-labelledby="whitelist-title">
          <div class="list-head">
            <div class="list-title" id="whitelist-title"><span class="dot"></span>화이트리스트</div>
            <button type="button" class="small-btn danger" id="clear-whitelist">비우기</button>
          </div>
          <div class="list" id="whitelist-list"></div>
        </section>

        <section class="list-section" aria-labelledby="blacklist-title">
          <div class="list-head">
            <div class="list-title" id="blacklist-title"><span class="dot block"></span>블랙리스트</div>
            <button type="button" class="small-btn danger" id="clear-blacklist">비우기</button>
          </div>
          <div class="list" id="blacklist-list"></div>
        </section>
      </section>
    </section>
  </main>
  <div class="status" id="status"></div>

  <script src="domains.js"></script>
</body>
</html>
